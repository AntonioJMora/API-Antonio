<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favoritos - Hyrule</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="app-header">
    <img src="assets/logo.png" alt="Logo de Zelda">
    <h1>Enciclopedia Hyrule</h1>
    <p>Tus datos favoritos guardados</p>
    <ul class="nav-menu">
        <li><a href="index.html">Página Principal</a></li>
        <li><a href="favoritos.html">Mis Favoritos</a></li>
    </ul>
</header>
<main class="app-container">
    <!-- Bloque 2: Favoritos FireStore -->
    <section class="card">
        <article class="catalog-article">
            <h2>Mis Favoritos en la Nube</h2>
            <div class="fav-actions">
                <button id="btnDeleteAllFavs" class="btn btn-danger">Vaciar Todos</button>
                <select id="favFilterSelect" class="form-select">
                    <option value="all">Ver Todos</option>
                    <option value="games">Juegos</option>
                    <option value="staff">Personal</option>
                    <option value="characters">Personajes</option>
                    <option value="monsters">Monstruos</option>
                    <option value="bosses">Jefes</option>
                    <option value="dungeons">Mazmorras</option>
                    <option value="places">Lugares</option>
                    <option value="items">Objetos</option>
                </select>
                <select id="favSortSelect" class="form-select">
                    <option value="date-new">Más recientes</option>
                    <option value="date-old">Más antiguos</option>
                    <option value="name-asc">Nombre (A-Z)</option>
                    <option value="name-desc">Nombre (Z-A)</option>
                </select>
            </div>
        </article>

        <div id="favoritesState" class="search-state">Cargando tus favoritos desde Firebase...</div>

    </section>
</main>
<footer>
    <p>Zelda API | Desarrollado por Antonio Mora</p>
</footer>
</body>
</html>
